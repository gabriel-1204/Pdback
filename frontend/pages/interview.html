<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>면접 진행 - P:dback</title>
  <!-- 절대경로 -->
  <link rel="stylesheet" href="/css/common.css">
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision/vision_bundle.mjs"
    crossorigin="anonymous"></script>
</head>
<body>

<nav class="nav">
  <a href="/" class="nav-logo">P:dback</a>
  <div class="nav-links">
    <a href="/start" class="active">면접 시작</a>
    <a href="/history">히스토리</a>
    <a href="/mypage">마이페이지</a>
    <a href="/login" id="auth-btn">로그인</a>
  </div>
</nav>

<div class="page-container">
  <div class="page-content" style="padding: 24px;">
    <div class="interview-layout">
      <!-- 웹캠 영역 -->
      <div class="webcam-area">
        <div class="webcam-status">
          <div style="display:flex;align-items:center;gap:4px;">
            <span class="status-dot green"></span>
            <span class="status-label">카메라 ON</span>
          </div>
          <div id="stt-status" style="display:flex;align-items:center;gap:4px;">
            <span class="status-dot" id="stt-dot"></span>
            <span class="status-label" id="stt-label">마이크 OFF</span>
          </div>
        </div>
        <div class="timer-badge">⏱ 00:00</div>
        <div class="webcam-placeholder"><video id="webcam" autoplay playsinline muted></video></div>
        <div style="font-size:14px;opacity:0.6;">웹캠 미리보기</div>
        <div class="attitude-bar">
          <div class="attitude-bar-title">실시간 태도 분석 (MediaPipe)</div>
          <div style="display:flex;justify-content:space-between;font-size:11px;margin-bottom:4px;">
            <span>시선 정면 주시율</span>
            <span>--%</span>
          </div>
          <div class="attitude-meter"><div class="attitude-meter-fill" style="width:0%"></div></div>
          <div style="display:flex;justify-content:space-between;font-size:11px;margin:6px 0 4px;">
            <span>자세 안정도</span>
            <span>--%</span>
          </div>
          <div class="attitude-meter"><div class="attitude-meter-fill" style="width:0%"></div></div>
        </div>
      </div>

      <!-- 채팅 패널 -->
      <div class="chat-panel">
        <div class="chat-header">
          💬 면접 진행 <span style="font-size:12px;color:#999;font-weight:400;">질문 0/0</span>
        </div>
        <!-- 데이터를 바로 아래에서 저장 및 꺼내 씀 -->
        <input type="hidden" id="session-id">
        <div class="chat-messages">
          <!-- 면접 시작 시 AI 질문이 여기에 추가됩니다 -->
        </div>
      </div>
    </div>

    <!-- STT 입력 영역 (레이아웃 아래 전체 너비) -->
    <div class="stt-bottom-area">
      <div class="stt-text-box">
          <span id="final-span"></span>
        <span id="interim-span" style="color:#999;"></span>
      </div>
      <div class="stt-controls">
        <span style="font-size:11px;color:#999;">스페이스바로도 시작/완료할 수 있습니다</span>
        <button class="btn-primary" id="toggle-btn" disabled>답변 시작</button>
        <button class="btn-primary" id="next-session-btn" disabled>다음 세션 시작</button>
      </div>
    </div>
  </div>
</div>
<script src="/js/webcam.js"></script>
<script src="/js/sound_detection.js"></script>
<script src="/js/auth-nav.js"></script>
</body>
</html>
