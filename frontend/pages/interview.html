<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>면접 진행 - P:dback</title>
  <!-- 절대경로 -->
  <link rel="stylesheet" href="/css/common.css">
  <script type="module">
    import { FilesetResolver, FaceLandmarker, PoseLandmarker } from "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.34/vision_bundle.mjs";
    window.FilesetResolver = FilesetResolver;
    window.FaceLandmarker = FaceLandmarker;
    window.PoseLandmarker = PoseLandmarker;
  </script>
</head>
<body>

<nav class="nav">
  <a href="/" class="nav-logo">P:dback</a>
  <div class="nav-links">
    <a href="/start" class="active">면접 시작</a>
    <a href="/history">히스토리</a>
    <a href="/mypage">마이페이지</a>
    <a href="/login" id="auth-btn">로그인</a>
  </div>
</nav>

<div class="page-container interview-page-container">
  <div class="page-content interview-page">
    <div class="interview-layout">
      <!-- 웹캠 + 태도 분석 -->
      <div class="webcam-wrapper">
        <div class="webcam-topbar">
          <div class="webcam-status">
            <div style="display:flex;align-items:center;gap:4px;">
              <span class="status-dot green"></span>
              <span class="status-label">카메라 ON</span>
            </div>
            <div id="stt-status" style="display:flex;align-items:center;gap:4px;">
              <span class="status-dot" id="stt-dot"></span>
              <span class="status-label" id="stt-label">마이크 OFF</span>
            </div>
          </div>
          <div class="timer-badge">⏱ 00:00</div>
        </div>
        <div class="webcam-area">
          <video id="webcam" autoplay playsinline muted></video>
          <canvas id="landmark-canvas"></canvas>
        </div>
        <div class="attitude-bar">
          <div class="attitude-row">
            <span class="attitude-icon">👁</span>
            <span class="attitude-label">시선</span>
            <div class="attitude-meter"><div class="attitude-meter-fill" style="width:0%"></div></div>
            <span class="attitude-value" id="eye-rate">--%</span>
          </div>
          <div class="attitude-row">
            <span class="attitude-icon">🧍</span>
            <span class="attitude-label">자세</span>
            <div class="attitude-meter"><div class="attitude-meter-fill" style="width:0%"></div></div>
            <span class="attitude-value" id="posture-rate">--%</span>
          </div>
        </div>
      </div>

      <!-- 채팅 패널 -->
      <div class="chat-panel">
        <div class="chat-header">
          💬 면접 진행 <span style="font-size:12px;color:#999;font-weight:400;">질문 0/0</span>
        </div>
        <!-- 데이터를 바로 아래에서 저장 및 꺼내 씀 -->
        <input type="hidden" id="session-id">
        <div class="chat-messages">
          <!-- 면접 시작 시 AI 질문이 여기에 추가됩니다 -->
        </div>
      </div>
    </div>

    <!-- STT 입력 영역 (레이아웃 아래 전체 너비) -->
    <div class="stt-bottom-area">
      <div class="stt-final-box"><span id="final-span"></span></div>
      <div class="stt-interim-box"><span id="interim-span"></span></div>
      <div class="stt-controls">
        <span class="stt-hint">스페이스바로도 시작/완료할 수 있습니다</span>
        <button class="btn-primary" id="toggle-btn" disabled>답변 시작</button>
      </div>
    </div>
  </div>
</div>

<!-- 세션 완료 모달 -->
<div class="session-modal-overlay" id="session-modal" style="display:none;">
  <div class="session-modal">
    <div class="session-modal-icon">&#10004;&#65039;</div>
    <h3 class="session-modal-title" id="session-modal-title"></h3>
    <p class="session-modal-desc" id="session-modal-desc"></p>
    <button class="btn-primary session-modal-btn" id="feedback-btn" style="display:none;">피드백 확인하기</button>
    <button class="btn-secondary session-modal-btn" id="next-session-btn">다음 세션 시작</button>
  </div>
</div>

<script src="/js/auth-fetch.js"></script>
<script src="/js/webcam.js"></script>
<script src="/js/mediapipe_analysis.js"></script>
<script src="/js/sound_detection.js"></script>
<script src="/js/auth-nav.js"></script>
</body>
</html>
