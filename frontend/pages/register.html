<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>회원가입 - P:dback</title>
    <link rel="stylesheet" href="../css/common.css">
  </head>
  <body>

    <nav class="nav">
      <a href="/" class="nav-logo">P:dback</a>
      <div class="nav-links">
        <a href="/start">면접 시작</a>
        <a href="/history">히스토리</a>
        <a href="/mypage">마이페이지</a>
        <a href="/login" id="auth-btn">로그인</a>
      </div>
    </nav>

    <div class="page-container">
      <div class="page-content">
        <div class="auth-container">
          <div class="auth-logo">P:dback</div>
          <div class="auth-subtitle">AI 면접 코치와 함께 면접 실력을 키워보세요</div>
          <form id="register-form">
            <div class="input-group">
              <label for="username">이름</label>
              <input type="text" id="username" placeholder="홍길동">
            </div>
            <div class="input-group">
              <label for="email">이메일</label>
              <input type="email" id="email" placeholder="example@email.com">
            </div>
            <div class="input-group">
              <label for="password">비밀번호</label>
              <input type="password" id="password" placeholder="비밀번호 입력(8자 이상)">
            </div>
            <div class="input-group">
              <label for="password-confirm">비밀번호 확인</label>
              <input type="password" id="password-confirm" placeholder="비밀번호 확인">
            </div>
            <div class="input-group">
              <label for="position">포지션</label>
              <select id="position">
                <option value="">선택 안함</option>
                <option value="backend">backend</option>
                <option value="frontend">frontend</option>
                <option value="fullstack">fullstack</option>
                <option value="data">data</option>
                <option value="devops">devops</option>
              </select>
            </div>
            <button type="submit" class="btn-primary">회원가입</button>
          </form>
          <div class="auth-footer">
            이미 계정이 있으신가요? <a href="/login">로그인</a>
          </div>
        </div>
      </div>
    </div>

    <script>
      document.getElementById('register-form').addEventListener('submit', async (e) => {
        e.preventDefault();

        const username = document.getElementById('username').value;
        const email = document.getElementById('email').value;
        const password = document.getElementById('password').value;
        const passwordConfirm = document.getElementById('password-confirm').value;
        const position = document.getElementById('position').value || null; //포지션은 선택값이라 입력없으면 null로 출력

        //폼 유효성 검사
        if (!username) { alert('이름을 입력해주세요.'); return; }
        if (!email) { alert('이메일을 입력해주세요.'); return; }
        if (!password) { alert('비밀번호를 입력해주세요.'); return; }
        if (password.length < 8) { alert('비밀번호는 8자 이상 입력해주세요.'); return; }
        if (password !== passwordConfirm) {alert('비밀번호가 일치하지 않습니다.'); return; }

        //백엔드 API 연동
        try {
          const response = await fetch('/api/v1/auth/register', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ username, email, password, position }),
          });

          const data = await response.json();

          //회원가입 성공시
          if (response.ok) {
            localStorage.setItem('access_token', data.access_token);
            localStorage.setItem('refresh_token', data.refresh_token);
            window.location.href = '/start'; //면접페이지로 이동
          } else {
            alert(data.detail);
          }
        } catch (e) {
          alert('네트워크 오류가 발생했습니다.'); 
        }
      });
    </script>
    <script src="/js/auth-nav.js"></script>
  </body>
</html>
