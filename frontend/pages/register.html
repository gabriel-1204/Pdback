<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>회원가입 - P:dback</title>
  <link rel="stylesheet" href="../css/common.css">
</head>
<body>

<nav class="nav">
  <a href="../index.html" class="nav-logo">P:dback</a>
  <div class="nav-links">
    <a href="interview-setup.html">면접 시작</a>
    <a href="history.html">히스토리</a>
    <a href="mypage.html">마이페이지</a>
    <a href="login.html">로그인</a>
  </div>
</nav>

<div class="page-container">
  <div class="page-content">
    <div class="auth-container">
      <div class="auth-logo">P:dback</div>
      <div class="auth-subtitle">AI 면접 코치와 함께 면접 실력을 키워보세요</div>
      <form id="register-form">
        <div class="input-group">
          <label>이름</label>
          <input type="text" placeholder="홍길동">
        </div>
        <div class="input-group">
          <label>이메일</label>
          <input type="email" placeholder="example@email.com">
        </div>
        <div class="input-group">
          <label>비밀번호</label>
          <input type="password" placeholder="비밀번호 입력">
        </div>
        <div class="input-group">
          <label>비밀번호 확인</label>
          <input type="password" placeholder="비밀번호 확인">
        </div>
        <button type="submit" class="btn-primary">회원가입</button>
      </form>
      <div class="auth-footer">
        이미 계정이 있으신가요? <a href="login.html">로그인</a>
      </div>
    </div>
  </div>
</div>

</body>
</html>
