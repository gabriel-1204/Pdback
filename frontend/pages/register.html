<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>회원가입 - P:dback</title>
    <link rel="stylesheet" href="../css/common.css">
  </head>
  <body>

    <nav class="nav">
      <a href="/" class="nav-logo">P:dback</a>
      <div class="nav-links">
        <a href="/start">면접 시작</a>
        <a href="/history">히스토리</a>
        <a href="/mypage">마이페이지</a>
        <a href="/login" id="auth-btn">로그인</a>
      </div>
    </nav>

    <div class="page-container">
      <div class="page-content">
        <div class="auth-container">
          <div class="auth-logo">P:dback</div>
          <div class="auth-subtitle">AI 면접 코치와 함께 면접 실력을 키워보세요</div>
          <form id="register-form">
            <div class="input-group">
              <label for="username">이름</label>
              <input type="text" id="username" placeholder="홍길동">
            </div>
            <div class="input-group">
              <label for="email">이메일</label>
              <input type="email" id="email" placeholder="example@email.com">
            </div>
            <div class="input-group">
              <label for="password">비밀번호</label>
              <input type="password" id="password" placeholder="비밀번호 입력(8자 이상)">
            </div>
            <div class="input-group">
              <label for="password-confirm">비밀번호 확인</label>
              <input type="password" id="password-confirm" placeholder="비밀번호 확인">
            </div>
            <div class="input-group">
              <label for="position">포지션</label>
              <select id="position">
                <option value="">선택 안함</option>
                <option value="backend">backend</option>
                <option value="frontend">frontend</option>
                <option value="fullstack">fullstack</option>
                <option value="data">data</option>
                <option value="devops">devops</option>
              </select>
            </div>
            <button type="submit" class="btn-primary">회원가입</button>
          </form>
          <div class="auth-footer">
            이미 계정이 있으신가요? <a href="/login">로그인</a>
          </div>
        </div>
      </div>
    </div>

    <script src="/js/register.js"></script>
    <script src="/js/auth-nav.js"></script>
  </body>
</html>
