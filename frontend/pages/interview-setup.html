<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>면접 설정 - P:dback</title>
  <link rel="stylesheet" href="../css/common.css">
</head>
<body>

<nav class="nav">
  <a href="../index.html" class="nav-logo">P:dback</a>
  <div class="nav-links">
    <a href="interview-setup.html" class="active">면접 시작</a>
    <a href="history.html">히스토리</a>
    <a href="mypage.html">마이페이지</a>
    <a href="login.html">로그인</a>
  </div>
</nav>

<div class="page-container">
  <div class="page-content">
    <div class="setup-container">
      <div class="setup-title">면접 설정</div>
      <div class="setup-subtitle">면접 환경을 설정하고 연습을 시작하세요</div>

      <div class="input-group">
        <label>직무 선택</label>
        <div class="radio-group">
          <div class="radio-mock selected">백엔드</div>
          <div class="radio-mock">프론트엔드</div>
          <div class="radio-mock">풀스택</div>
          <div class="radio-mock">데이터</div>
          <div class="radio-mock">DevOps</div>
        </div>
      </div>

      <div class="input-group">
        <label>기술 스택</label>
        <input type="text" placeholder="기술 스택을 검색하세요...">
        <div class="stack-tags">
          <div class="stack-tag">Python ✕</div>
          <div class="stack-tag">FastAPI ✕</div>
          <div class="stack-tag">MongoDB ✕</div>
        </div>
      </div>

      <div class="input-group">
        <label>경력 연차</label>
        <div class="radio-group">
          <div class="radio-mock selected">신입</div>
          <div class="radio-mock">1~3년</div>
          <div class="radio-mock">3~5년</div>
          <div class="radio-mock">5년 이상</div>
        </div>
      </div>

      <div class="input-group">
        <label>장비 권한 확인</label>
        <div class="permission-check">
          <div class="perm-item">
            <div class="perm-icon">📷</div>
            <div>카메라</div>
            <div class="perm-status">✓ 허용됨</div>
          </div>
          <div class="perm-item">
            <div class="perm-icon">🎤</div>
            <div>마이크</div>
            <div class="perm-status">✓ 허용됨</div>
          </div>
        </div>
      </div>

      <button class="btn-primary" style="margin-top: 16px;">면접 시작하기</button>
    </div>
  </div>
</div>

</body>
</html>
