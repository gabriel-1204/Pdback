<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>로그인 - P:dback</title>
  <link rel="stylesheet" href="../css/common.css">
</head>
<body>

<nav class="nav">
  <a href="../index.html" class="nav-logo">P:dback</a>
  <div class="nav-links">
    <a href="interview-setup.html">면접 시작</a>
    <a href="history.html">히스토리</a>
    <a href="mypage.html">마이페이지</a>
    <a href="login.html" class="active">로그인</a>
  </div>
</nav>

<div class="page-container">
  <div class="page-content">
    <div class="auth-container">
      <div class="auth-logo">P:dback</div>
      <div class="auth-subtitle">로그인하고 면접 연습을 시작하세요</div>
      <form id="login-form">
        <div class="input-group">
          <label>이메일</label>
          <input type="email" id="email" placeholder="example@email.com">
        </div>
        <div class="input-group">
          <label>비밀번호</label>
          <input type="password" id="password" placeholder="비밀번호 입력">
        </div>
        <button type="submit" class="btn-primary">로그인</button>
      </form>
      <div class="auth-footer">
        계정이 없으신가요? <a href="register.html">회원가입</a>
      </div>
    </div>
  </div>
</div>

<script>
  document.getElementById('login-form').addEventListener('submit', async (e) => {
    e.preventDefault();

    const email = document.getElementById('email').value;
    const password = document.getElementById('password').value;

    //폼 유효성 검사
    if (!email || !password) {
      alert('이메일과 비밀번호를 입력해주세요.');
      return;
    }

    //백엔드 API 연동
    try {
      const response = await fetch('/api/v1/auth/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email, password }),
      });

      const data = await response.json();

      if (response.ok) {
        localStorage.setItem('token', data.token);
        window.location.href = 'interview-setup.html';
      } else {
        alert(data.detail);
      }
    } catch (e) {
      alert('네트워크 오류가 발생했습니다.');
    }
  });
</script>

</body>
</html>
