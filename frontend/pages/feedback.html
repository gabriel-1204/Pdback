<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>피드백 결과 - P:dback</title>
  <link rel="stylesheet" href="/css/common.css">
</head>
<body>

<nav class="nav">
  <a href="/" class="nav-logo">P:dback</a>
  <div class="nav-links">
    <a href="/start">면접 시작</a>
    <a href="/history">히스토리</a>
    <a href="/mypage">마이페이지</a>
    <a href="/login" id="auth-btn">로그인</a>
  </div>
</nav>

<div class="page-container">
  <div class="page-content">

    <!-- 로딩 -->
    <div id="loading-state" class="loading-overlay">
      <div class="spinner"></div>
      <span>AI 피드백을 분석 중입니다...</span>
    </div>

    <!-- 에러 -->
    <div id="error-state" class="error-box" style="display:none;">
      <p id="error-message">오류가 발생했습니다.</p>
      <button class="btn-secondary" style="margin-top:16px;" onclick="window.history.back()">뒤로 가기</button>
    </div>

    <!-- 피드백 콘텐츠 (로드 후 표시) -->
    <div id="feedback-content" style="display:none;">

      <div class="feedback-header">
        <h2>면접 피드백 리포트</h2>
        <p class="text-muted" id="feedback-subtitle">로딩 중...</p>
      </div>

      <!-- 점수 카드 -->
      <div class="score-cards">
        <div class="score-card overall">
          <div class="score-label">AI 종합</div>
          <div class="score-value">
            <span id="overall-score">-</span><span class="score-max"> / 10</span>
          </div>
          <div style="font-size:11px;color:#aaa;margin-top:6px;">(기술 · 논리 · 키워드 평균)</div>
        </div>
        <div class="score-card tech">
          <div class="score-label">기술 정확도</div>
          <div class="score-value">
            <span id="tech-score">-</span><span class="score-max"> / 10</span>
          </div>
        </div>
        <div class="score-card logic">
          <div class="score-label">논리 구성력</div>
          <div class="score-value">
            <span id="logic-score">-</span><span class="score-max"> / 10</span>
          </div>
        </div>
        <div class="score-card keyword">
          <div class="score-label">키워드</div>
          <div class="score-value">
            <span id="keyword-score">-</span><span class="score-max"> / 10</span>
          </div>
        </div>
        <div class="score-card attitude">
          <div class="score-label">태도 점수</div>
          <div class="score-value">
            <span id="attitude-score">-</span><span class="score-max"> / 10</span>
          </div>
          <div style="font-size:11px;color:#aaa;margin-top:6px;">(시선 · 자세 가중치 평균)</div>
        </div>
      </div>

      <!-- 점수 차트 -->
      <div class="chart-section">
        <h3>항목별 점수 분포</h3>
        <div class="bar-chart">
          <div class="bar-item">
            <div class="bar-value" id="bar-val-tech">-</div>
            <div class="bar" id="bar-tech" style="height:0px;background:linear-gradient(180deg,#4A6CF7,#6c9fff);transition:height 0.6s ease;"></div>
            <div class="bar-label">기술</div>
          </div>
          <div class="bar-item">
            <div class="bar-value" id="bar-val-logic">-</div>
            <div class="bar" id="bar-logic" style="height:0px;background:linear-gradient(180deg,#2ed573,#7bed9f);transition:height 0.6s ease;"></div>
            <div class="bar-label">논리</div>
          </div>
          <div class="bar-item">
            <div class="bar-value" id="bar-val-keyword">-</div>
            <div class="bar" id="bar-keyword" style="height:0px;background:linear-gradient(180deg,#ffa502,#ffd06b);transition:height 0.6s ease;"></div>
            <div class="bar-label">키워드</div>
          </div>
          <div class="bar-item">
            <div class="bar-value" id="bar-val-eyes">-</div>
            <div class="bar" id="bar-eyes" style="height:0px;background:linear-gradient(180deg,#ff6348,#ff9f80);transition:height 0.6s ease;"></div>
            <div class="bar-label">시선</div>
          </div>
          <div class="bar-item">
            <div class="bar-value" id="bar-val-posture">-</div>
            <div class="bar" id="bar-posture" style="height:0px;background:linear-gradient(180deg,#a55eea,#d4a5ff);transition:height 0.6s ease;"></div>
            <div class="bar-label">자세</div>
          </div>
        </div>
      </div>

      <!-- 종합 코멘트 -->
      <div class="overall-comment">
        <div class="comment-label">💬 종합 평가</div>
        <p id="interview-comment">-</p>
      </div>

      <!-- 태도 코멘트 -->
      <div class="posture-comment-box">
        <div class="comment-label">🎯 태도 분석</div>
        <p id="posture-comment">-</p>
      </div>

      <!-- 강점 -->
      <div class="feedback-section">
        <h3>💪 강점</h3>
        <ul class="feedback-list" id="strengths-list">
          <!-- JS로 채워집니다 -->
        </ul>
      </div>

      <!-- 개선점 -->
      <div class="feedback-section">
        <h3>📝 개선점</h3>
        <ul class="feedback-list" id="improvements-list">
          <!-- JS로 채워집니다 -->
        </ul>
      </div>

      <!-- 질문별 피드백 -->
      <div class="feedback-section">
        <h3>📌 질문별 상세 피드백</h3>
        <div id="question-feedbacks">
          <!-- JS로 채워집니다 -->
        </div>
      </div>

      <div class="feedback-actions">
        <a href="history.html" class="btn-primary">히스토리에서 보기</a>
        <a href="interview-setup.html" class="btn-secondary">새 면접 시작</a>
      </div>

    </div><!-- /feedback-content -->

  </div>
</div>

<script src="/js/feedback.js"></script>
<script src="/js/auth-nav.js"></script>
</body>
</html>
