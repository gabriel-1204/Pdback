<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>피드백 결과 - P:dback</title>
  <link rel="stylesheet" href="../css/common.css">
</head>
<body>

<nav class="nav">
  <a href="../index.html" class="nav-logo">P:dback</a>
  <div class="nav-links">
    <a href="interview-setup.html">면접 시작</a>
    <a href="history.html">히스토리</a>
    <a href="mypage.html">마이페이지</a>
    <a href="login.html">로그인</a>
  </div>
</nav>

<div class="page-container">
  <div class="page-content">
    <div class="feedback-header">
      <h2>면접 피드백 리포트</h2>
      <p class="text-muted">-- | -- · -- · --</p>
    </div>

    <!-- 점수 카드 -->
    <div class="score-cards">
      <div class="score-card tech">
        <div class="score-label">기술 정확도</div>
        <div class="score-value">-<span class="score-max"> / 10</span></div>
      </div>
      <div class="score-card logic">
        <div class="score-label">논리 구성력</div>
        <div class="score-value">-<span class="score-max"> / 10</span></div>
      </div>
      <div class="score-card attitude">
        <div class="score-label">태도 점수</div>
        <div class="score-value">-<span class="score-max"> / 10</span></div>
      </div>
    </div>

    <!-- 점수 차트 -->
    <div style="background:#f8f9fa;border-radius:12px;padding:24px;margin-bottom:24px;border:1px solid #eee;">
      <h3 style="font-size:14px;margin-bottom:16px;">항목별 점수 분포</h3>
      <div class="bar-chart">
        <div class="bar-item">
          <div class="bar" style="height:0px;background:linear-gradient(180deg,#4A6CF7,#6c9fff);"></div>
          <div class="bar-label">기술</div>
        </div>
        <div class="bar-item">
          <div class="bar" style="height:0px;background:linear-gradient(180deg,#2ed573,#7bed9f);"></div>
          <div class="bar-label">논리</div>
        </div>
        <div class="bar-item">
          <div class="bar" style="height:0px;background:linear-gradient(180deg,#ff6348,#ff9f80);"></div>
          <div class="bar-label">태도</div>
        </div>
        <div class="bar-item">
          <div class="bar" style="height:0px;background:linear-gradient(180deg,#ffa502,#ffd06b);"></div>
          <div class="bar-label">시선</div>
        </div>
        <div class="bar-item">
          <div class="bar" style="height:0px;background:linear-gradient(180deg,#a55eea,#d4a5ff);"></div>
          <div class="bar-label">자세</div>
        </div>
      </div>
    </div>

    <!-- 강점 -->
    <div class="feedback-section">
      <h3>💪 강점</h3>
      <ul class="feedback-list">
        <!-- API 응답으로 채워집니다 -->
      </ul>
    </div>

    <!-- 개선점 -->
    <div class="feedback-section">
      <h3>📝 개선점</h3>
      <ul class="feedback-list">
        <!-- API 응답으로 채워집니다 -->
      </ul>
    </div>

    <!-- 모범답안 -->
    <div class="feedback-section">
      <h3>📌 모범답안</h3>
      <div class="model-answer">
        <h4>Q. --</h4>
        <p>--</p>
      </div>
    </div>

    <div style="display:flex;gap:12px;justify-content:center;margin-top:32px;">
      <a href="history.html"><button class="btn-primary" style="width:auto;">히스토리에서 보기</button></a>
      <a href="interview-setup.html"><button class="btn-secondary">새 면접 시작</button></a>
    </div>
  </div>
</div>

</body>
</html>
