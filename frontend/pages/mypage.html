<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>마이페이지 - P:dback</title>
    <link rel="stylesheet" href="../css/common.css">
  </head>
  <body>

    <nav class="nav">
      <a href="/" class="nav-logo">P:dback</a>
      <div class="nav-links">
        <a href="/start">면접 시작</a>
        <a href="/history">히스토리</a>
        <a href="/mypage" class="active">마이페이지</a>
        <a href="/login" id="auth-btn">로그인</a>
      </div>
    </nav>

    <div class="page-container">
      <div class="page-content">
        <div class="profile-layout">
          <div class="profile-card">
            <div class="profile-avatar">👤</div>
            <div id="profile-name" class="profile-name">--</div>
            <div id="profile-email" class="profile-email">--</div>
            <div id="profile-position" class="profile-position">희망 직무 : --</div>
            <div class="profile-stats">
              <div class="stat-item">
                <div id="stat-total" class="stat-value">-</div>
                <div class="stat-label">총 면접 횟수</div>
              </div>
              <div class="stat-item">
                <div id="stat-avg" class="stat-value">-</div>
                <div class="stat-label">평균 점수</div>
              </div>
              <div class="stat-item">
                <div id="stat-best" class="stat-value">-</div>
                <div class="stat-label">최고 점수</div>
              </div>
              <div class="stat-item">
                <div id="stat-weekly" class="stat-value">-</div>
                <div class="stat-label">이번 주</div>
              </div>
            </div>
          </div>
          <div class="profile-form">
            <h3>프로필 수정</h3>
            <form id="profile-form">
              <div class="input-group">
                <label for="input-username">이름</label>
                <input id="input-username" type="text" placeholder="이름">
              </div>
              <div class="input-group">
                <label for="input-email">이메일</label>
                <input id="input-email" type="email" placeholder="이메일" disabled class="input-disabled">
              </div>
              <div class="input-group">
                <label for="input-position">희망 직무</label>
                <select id="input-position">
                  <option value="">선택 안 함</option>
                  <option value="backend">backend</option>
                  <option value="frontend">frontend</option>
                  <option value="fullstack">fullstack</option>
                  <option value="data">data</option>
                  <option value="devops">devops</option>
                </select>
              </div>
              <div class="input-group">
                <label for="input-current-password">현재 비밀번호</label>
                <input id="input-current-password" type="password" placeholder="현재 비밀번호">
              </div>
              <div class="input-group">
                <label for="input-new-password">새 비밀번호(8자 이상)</label>
                <input id="input-new-password" type="password" placeholder="새 비밀번호 입력">
              </div>
              <div class="input-group">
                <label for="input-confirm-password">새 비밀번호 확인(8자 이상)</label>
                <input id="input-confirm-password" type="password" placeholder="새 비밀번호 확인">
              </div>
              <div class="form-btn-group">
                <button type="submit" class="btn-primary">저장</button>
                <button type="button" id="btn-cancel" class="btn-secondary">취소</button>
              </div>
            </form>
            <div class="divider"></div>
            <div class="form-footer">
              <button id="btn-withdraw" class="btn-danger">회원 탈퇴</button>
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- 회원탈퇴 비밀번호 확인 모달 -->
    <div id="modal-withdraw" class="modal-overlay">
      <div class="modal-box">
        <h3>회원 탈퇴</h3>
        <p>비밀번호를 입력해주세요.</p>
        <div class="input-group">
          <input id="modal-password" type="password" placeholder="비밀번호">
        </div>
        <div class="modal-btn-group">
          <button id="modal-cancel" class="btn-secondary">취소</button>
          <button id="modal-confirm" class="btn-danger">탈퇴</button>
        </div>
      </div>
    </div>

    <script>
    (function() {
      //저장된 access_token 가져오기(만료 시 갱신 후 재할당)
      let token = localStorage.getItem('access_token');

      //토큰이 없음=로그인 하지않음 , 로그인페이지로 이동
      if (!token) { alert('로그인이 필요합니다.'); window.location.href = '/login'; return; }

      //사용자 정보 로드(내 정보 가져와서 보여주기 작업)
      //토큰이 있으면 로그인한 사람 - 없으면 로그인 안한사람
      //상대경로사용하여 배포시 자동으로 경로 맞춰지도록 설정
      async function loadUserInfo() {
        try {
          const response = await fetch('/api/v1/auth/me', {
            headers: { 'Authorization': `Bearer ${token}` }
          });

          // access_token 만료 시(401) refresh_token으로 새 토큰 발급 후 재시도
          if (response.status === 401) {
            const refreshToken = localStorage.getItem('refresh_token');
            if (!refreshToken) { window.location.href = '/login'; return; }

            const refreshResponse = await fetch('/api/v1/auth/refresh', {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({ refresh_token: refreshToken })
            });
            
            //리프레시토큰도 만료되면 로그인페이지로 이동
            if (!refreshResponse.ok) { window.location.href = '/login'; return; }

            const refreshData = await refreshResponse.json();
            token = refreshData.access_token; //새토큰 받으면
            localStorage.setItem('access_token', token); //업데이트
            localStorage.setItem('refresh_token', refreshData.refresh_token);
            return loadUserInfo();
          }

          //토큰만료 외 에러 시 로그인페이지로 이동
          if (!response.ok) {
            window.location.href = '/login';
            return;
          }


          const user = await response.json();
          document.getElementById('profile-name').textContent = user.username; //프로필칸 유저정보 표시용
          document.getElementById('profile-email').textContent = user.email;
          document.getElementById('profile-position').textContent = '희망 직무 : ' + (user.position || '--'); //직무
          document.getElementById('input-username').value = user.username; //이름 수정 폼 입력칸
          document.getElementById('input-email').value = user.email; //이메일 수정불가능 , 그냥 현재 이메일(아이디) 보여주기
          document.getElementById('input-position').value = user.position || ''; //희망 직무 선택
        } catch (error) {
          alert('사용자 정보를 불러오는 데 실패했습니다.');
        }
      }

      //취소 버튼 - 입력 중인 내용을 원래 정보로 되돌리기
      document.getElementById('btn-cancel').addEventListener('click', () => {
        loadUserInfo();
      });

      //프로필 수정(이름,비밀번호)
      document.getElementById('profile-form').addEventListener('submit', async (e) => {
        e.preventDefault();

        const username = document.getElementById('input-username').value;
        const position = document.getElementById('input-position').value || undefined;
        const currentPassword = document.getElementById('input-current-password').value;
        const newPassword = document.getElementById('input-new-password').value;
        const confirmPassword = document.getElementById('input-confirm-password').value;

        //새로운 비밀번호 입력했을 때만 유효성 검사
        //이름만 변경, 비밀번호만 변경, 둘다 변경 가능
        if (newPassword) {
          if (!currentPassword) {
            alert('현재 비밀번호를 입력해주세요.');
            return;
          }
          if (newPassword !== confirmPassword) {
            alert('새 비밀번호가 일치하지 않습니다.');
            return;
          }
        }

        try {
          const response = await fetch('/api/v1/auth/me', {
            method: 'PATCH',
            headers: {
              'Content-Type': 'application/json',
              'Authorization': `Bearer ${token}`
            },
            body: JSON.stringify({
              username,
              position,
              current_password: currentPassword || undefined, //변경된 값있으면 전송, 없으면 제외
              new_password: newPassword || undefined,
            })
          });

          if (response.ok) {
            alert('프로필이 수정되었습니다.'); //수정후에
            loadUserInfo(); //다시 실행

            //수정하고나면 비밀번호도 초기화
            document.getElementById('input-current-password').value='';
            document.getElementById('input-new-password').value='';
            document.getElementById('input-confirm-password').value='';
          } else {
            const errorData = await response.json();
            alert(errorData.detail);
            document.getElementById('input-current-password').value='';
            document.getElementById('input-new-password').value='';
            document.getElementById('input-confirm-password').value='';
          }
        } catch (error) {
          alert('네트워크 오류가 발생했습니다. 다시 시도해주세요.');
        }
      });

      //회원 탈퇴 - 모달 열기
      document.getElementById('btn-withdraw').addEventListener('click', () => {
        if (!confirm('정말 탈퇴하시겠습니까?')) return;
        const modal = document.getElementById('modal-withdraw');
        modal.style.display = 'flex';
        document.getElementById('modal-password').value = '';
      });

      //모달 취소
      document.getElementById('modal-cancel').addEventListener('click', () => {
        document.getElementById('modal-withdraw').style.display = 'none';
      });

      //모달 탈퇴 확인
      document.getElementById('modal-confirm').addEventListener('click', async () => {
        const password = document.getElementById('modal-password').value;
        if (!password) { alert('비밀번호를 입력해주세요.'); return; }

        try {
          const response = await fetch('/api/v1/auth/me', {
            method: 'DELETE',
            headers: {
              'Authorization': `Bearer ${token}`,
              'Content-Type': 'application/json'
            },
            body: JSON.stringify({ password })
          });

          if (!response.ok) {
            alert('회원 탈퇴에 실패했습니다.');
            return;
          }
        } catch (error) {
          alert('네트워크 오류가 발생했습니다.');
          return;
        }

        localStorage.removeItem('access_token'); //토큰 삭제하고
        localStorage.removeItem('refresh_token');
        window.location.href = '/login'; //로그인페이지 이동
      });
      
      // 통계 데이터 로드
      async function loadStats() {
        try {
          const [weeklyRes, totalRes] = await Promise.all([
            fetch('/api/v1/auth/stats/weekly', { headers: { 'Authorization': `Bearer ${token}` } }),
            fetch('/api/v1/auth/stats/total', { headers: { 'Authorization': `Bearer ${token}` } })
          ]);

          if (weeklyRes.ok) {
            const weeklyData = await weeklyRes.json();
            document.getElementById('stat-weekly').textContent = weeklyData.weekly_interviews;
          }

          if (totalRes.ok) {
            const totalData = await totalRes.json();
            document.getElementById('stat-total').textContent = totalData.total_count;
            document.getElementById('stat-avg').textContent = totalData.avg_score;
            document.getElementById('stat-best').textContent = totalData.best_score;
          }
        } catch (error) {
          console.error('통계 데이터를 불러오는 데 실패했습니다.', error);
        }
      }

      //토큰 있으면 사용자 정보 화면에 표시
      loadUserInfo();
      loadStats();
    })();
    </script>
    <script src="/js/auth-nav.js"></script>
  </body>
</html>
